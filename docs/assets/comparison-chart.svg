<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" role="img" aria-label="ApkBugFinder vs APKHunt comparison">
  <rect width="960" height="400" rx="16" fill="#09090b" stroke="#27272a"/>
  <text x="40" y="45" fill="#fafafa" font-family="system-ui,sans-serif" font-size="22" font-weight="700">ApkBugFinder vs APKHunt</text>
  <text x="40" y="72" fill="#71717a" font-family="system-ui,sans-serif" font-size="14">Same engine. Modern experience.</text>

  <!-- Headers -->
  <text x="480" y="110" fill="#71717a" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Feature Score (out of 10)</text>
  <text x="200" y="140" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">Web UI</text>
  <text x="200" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">MASVS Rules</text>
  <text x="200" y="210" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">JADX Engine</text>
  <text x="200" y="245" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">Export / API</text>
  <text x="200" y="280" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">macOS Support</text>
  <text x="200" y="315" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="12" text-anchor="end">Secret Detection</text>

  <!-- APKHunt bars (gray) -->
  <text x="260" y="125" fill="#71717a" font-family="system-ui,sans-serif" font-size="11">APKHunt</text>
  <rect x="260" y="130" width="40" height="12" rx="3" fill="#52525b"/>
  <rect x="260" y="165" width="280" height="12" rx="3" fill="#52525b"/>
  <rect x="260" y="200" width="280" height="12" rx="3" fill="#52525b"/>
  <rect x="260" y="235" width="56" height="12" rx="3" fill="#52525b"/>
  <rect x="260" y="270" width="28" height="12" rx="3" fill="#52525b"/>
  <rect x="260" y="305" width="84" height="12" rx="3" fill="#52525b"/>

  <!-- ApkBugFinder bars (green) -->
  <text x="260" y="345" fill="#34d399" font-family="system-ui,sans-serif" font-size="11" font-weight="600">ApkBugFinder</text>
  <rect x="260" y="128" width="280" height="16" rx="4" fill="#10b981"/>
  <rect x="260" y="163" width="280" height="16" rx="4" fill="#10b981"/>
  <rect x="260" y="198" width="280" height="16" rx="4" fill="#10b981"/>
  <rect x="260" y="233" width="252" height="16" rx="4" fill="#10b981"/>
  <rect x="260" y="268" width="280" height="16" rx="4" fill="#10b981"/>
  <rect x="260" y="303" width="224" height="16" rx="4" fill="#10b981"/>

  <!-- Scale -->
  <line x1="260" y1="360" x2="820" y2="360" stroke="#3f3f46"/>
  <text x="260" y="378" fill="#52525b" font-family="system-ui,sans-serif" font-size="10">0</text>
  <text x="540" y="378" fill="#52525b" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">5</text>
  <text x="820" y="378" fill="#52525b" font-family="system-ui,sans-serif" font-size="10" text-anchor="end">10</text>
</svg>
