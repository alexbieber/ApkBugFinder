<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="Architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="960" height="380" rx="16" fill="#09090b" stroke="#27272a"/>
  <text x="40" y="42" fill="#fafafa" font-family="system-ui,sans-serif" font-size="22" font-weight="700">How ApkBugFinder Works</text>

  <!-- User -->
  <rect x="40" y="90" width="140" height="80" rx="12" fill="#18181b" stroke="#3f3f46"/>
  <text x="110" y="125" fill="#fafafa" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">=d User</text>
  <text x="110" y="148" fill="#71717a" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Upload APK</text>

  <!-- Web UI -->
  <rect x="240" y="75" width="180" height="110" rx="12" fill="#14532d" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.5"/>
  <text x="330" y="115" fill="#34d399" font-family="system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle">Next.js UI</text>
  <text x="330" y="138" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Dashboard À Export</text>
  <text x="330" y="158" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Vercel-ready</text>

  <!-- Scanner -->
  <rect x="480" y="60" width="200" height="140" rx="12" fill="#14532d" fill-opacity="0.2" stroke="#10b981"/>
  <text x="580" y="95" fill="#34d399" font-family="system-ui,sans-serif" font-size="15" font-weight="700" text-anchor="middle">Go Scanner</text>
  <text x="580" y="118" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">dex2jar Æ JADX</text>
  <text x="580" y="138" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">70+ MASVS rules</text>
  <text x="580" y="158" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">JSON API</text>

  <!-- Output -->
  <rect x="740" y="90" width="180" height="80" rx="12" fill="#18181b" stroke="#3f3f46"/>
  <text x="830" y="125" fill="#fafafa" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">=╩ Report</text>
  <text x="830" y="148" fill="#71717a" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Severity À CWE À Evidence</text>

  <!-- Arrows -->
  <line x1="180" y1="130" x2="235" y2="130" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="130" x2="475" y2="130" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="130" x2="735" y2="130" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline detail -->
  <rect x="40" y="230" width="880" height="110" rx="12" fill="#18181b" stroke="#27272a"/>
  <text x="60" y="260" fill="#71717a" font-family="system-ui,sans-serif" font-size="12" font-weight="600">ANALYSIS PIPELINE</text>
  <g font-family="system-ui,sans-serif" font-size="13" fill="#d4d4d8">
    <rect x="60" y="275" width="150" height="44" rx="8" fill="#27272a"/>
    <text x="135" y="302" text-anchor="middle">.apk file</text>
    <text x="230" y="302" fill="#34d399">Æ</text>
    <rect x="250" y="275" width="150" height="44" rx="8" fill="#27272a"/>
    <text x="325" y="302" text-anchor="middle">dex2jar</text>
    <text x="420" y="302" fill="#34d399">Æ</text>
    <rect x="440" y="275" width="150" height="44" rx="8" fill="#27272a"/>
    <text x="515" y="302" text-anchor="middle">JADX decompile</text>
    <text x="610" y="302" fill="#34d399">Æ</text>
    <rect x="630" y="275" width="150" height="44" rx="8" fill="#27272a"/>
    <text x="705" y="302" text-anchor="middle">MASVS grep</text>
    <text x="800" y="302" fill="#34d399">Æ</text>
    <rect x="820" y="275" width="80" height="44" rx="8" fill="#14532d" stroke="#10b981" stroke-opacity="0.5"/>
    <text x="860" y="302" text-anchor="middle" fill="#34d399">Report</text>
  </g>
</svg>
