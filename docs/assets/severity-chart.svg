    <text x="170" y="345" text-anchor="middle">Critical</text>
    <text x="310" y="345" text-anchor="middle">High</text>
    <text x="450" y="345" text-anchor="middle">Medium</text>
    <text x="590" y="345" text-anchor="middle">Low</text>
    <text x="730" y="345" text-anchor="middle">Info</text>
  </g>

  <rect x="150" y="300" width="40" height="20" rx="4" fill="#ef4444"/>
  <text x="170" y="292" fill="#ef4444" font-family="system-ui,sans-serif" font-size="14" font-weight="700" text-anchor="middle">1</text>

  <rect x="280" y="180" width="60" height="140" rx="6" fill="#f97316"/>
  <text x="310" y="170" fill="#f97316" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">10</text>

  <rect x="410" y="100" width="80" height="220" rx="6" fill="#eab308"/>
  <text x="450" y="90" fill="#eab308" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">18</text>

  <rect x="560" y="210" width="60" height="110" rx="6" fill="#3b82f6"/>
  <text x="590" y="200" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">9</text>

  <rect x="700" y="230" width="60" height="90" rx="6" fill="#71717a"/>
  <text x="730" y="220" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">6</text>

  <!-- Legend highlight -->
  <rect x="40" y="100" width="60" height="220" rx="8" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-opacity="0.3"/>
  <text x="70" y="130" fill="#34d399" font-family="system-ui,sans-serif" font-size="28" font-weight="800" text-anchor="middle">44</text>
  <text x="70" y="155" fill="#71717a" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">TOTAL</text>
