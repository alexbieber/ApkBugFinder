<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Severity findings chart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="16" fill="url(#bg)" stroke="#27272a"/>
  <text x="40" y="45" fill="#fafafa" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Findings by Severity</text>
  <text x="40" y="72" fill="#71717a" font-family="system-ui,sans-serif" font-size="14">Real scan: InsecureBankv2.apk · 16.4s · 44 total findings</text>

