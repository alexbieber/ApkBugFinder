services:
  scanner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scanner
    ports:
      - "8080:8080"
    volumes:
      - scanner-work:/tmp/apkbugfinder
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - SCANNER_API_URL=http://scanner:8080
    depends_on:
      - scanner

volumes:
  scanner-work:
